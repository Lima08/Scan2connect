    <style>
        .progress-bar-animated {
            animation: progress 10s linear forwards;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .checkmark-animated {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes scaleIn {
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased overflow-hidden">
    <!-- TopAppBar -->
    <header class="w-full top-0 left-0 bg-surface z-50">
        <div
            class="flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 w-full max-w-[1280px] mx-auto">
            <div class="flex items-center gap-base">
                <span aria-hidden="true" class="material-symbols-outlined text-google-blue text-2xl">qr_code_2</span>
                <span
                    class="font-headline-sm text-headline-sm-mobile md:font-headline-sm md:text-headline-sm font-bold text-google-blue">GDG
                    Connect</span>
            </div>
            <!-- Navigation suppressed due to linear/transactional intent -->
        </div>
    </header>
    <!-- Main Content - Centered Linear Flow -->
    <main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop relative">
        <!-- Subtle Background Decorative Elements -->
        <div class="absolute inset-0 pointer-events-none overflow-hidden flex justify-center items-center opacity-30">
            <div class="w-96 h-96 bg-primary-fixed rounded-full blur-[100px] absolute -top-20 -right-20"></div>
            <div class="w-96 h-96 bg-secondary-fixed rounded-full blur-[100px] absolute -bottom-20 -left-20"></div>
        </div>
        <div
            class="max-w-md w-full bg-surface-container-lowest border border-surface-variant rounded-[2rem] p-lg flex flex-col items-center text-center shadow-sm relative z-10">
            <!-- Icon -->
            <div
                class="w-24 h-24 bg-secondary-container text-on-secondary-container rounded-full flex items-center justify-center mb-md checkmark-animated">
                <span aria-hidden="true" class="material-symbols-outlined text-[48px]"
                    style="font-variation-settings: 'FILL' 1;">check_circle</span>
            </div>
            <!-- Headlines -->
            <h1 class="font-headline-md text-headline-md text-on-surface mb-sm">Perfil vinculado!</h1>
            <!-- Primary Message -->
            <p class="font-body-lg text-body-lg text-on-surface-variant mb-md">
                Seu adesivo foi vinculado a <strong class="text-on-surface" id="profile-name">Perfil
                    vinculado!</strong>.
            </p>
            <!-- Secondary Message -->
            <p class="font-body-md text-body-md text-outline mb-lg">
                Quem escanear seu adesivo verá seu perfil no LinkedIn.
            </p>
            <!-- Redirection Progress -->
            <div class="w-full mb-base">
                <div class="flex justify-between items-end mb-xs">
                    <span class="font-label-md text-label-md text-outline">Redirecionando para o perfil...</span>
                    <span class="font-label-md text-label-md text-outline" id="countdown">6s</span>
                </div>
                <div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden">
                    <div class="h-full bg-google-blue rounded-full progress-bar-animated"></div>
                </div>
            </div>
            <!-- Manual Action Fallback -->
            <button
                class="mt-md px-lg py-sm bg-surface-container-high text-google-blue font-label-lg text-label-lg rounded-full hover:bg-surface-variant transition-colors active:scale-95 duration-150"
                id="go-now-btn">
                Ir para o perfil agora
            </button>
        </div>
    </main>
    <!-- Footer suppressed due to linear/transactional intent -->
    <script src="/js/linkedin-open.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search)
            const name = params.get('name') ?? 'Perfil vinculado!'
            const linkedinUrl = params.get('url') ?? null

            document.getElementById('profile-name').textContent = name

            const goNowBtn = document.getElementById('go-now-btn')
            const openApp = () => {
                if (!linkedinUrl) return
                if (LinkedInOpen.isMobile()) {
                    LinkedInOpen.openLinkedIn(linkedinUrl)
                } else {
                    LinkedInOpen.openLinkedInWeb(linkedinUrl)
                }
            }
            const openWeb = () => {
                if (linkedinUrl) LinkedInOpen.openLinkedInWeb(linkedinUrl)
            }

            goNowBtn.addEventListener('click', openApp)

            const countdownElement = document.getElementById('countdown')
            let seconds = 6
            const interval = setInterval(() => {
                seconds--
                if (seconds >= 0) countdownElement.textContent = `${seconds}s`
                if (seconds === 0) { clearInterval(interval); openWeb() }
            }, 1000)
        });
    </script>
