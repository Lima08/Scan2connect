<head>

                        "on-primary-fixed": "#001a41",
                        "surface-tint": "#005ac1",
                        "on-surface": "#1A1B1F",
                        "on-surface-variant": "#424753",
                        "on-tertiary-container": "#fffbff",
                        "primary-fixed": "#d8e2ff",
                        "secondary-container": "#86f898",
                        "surface-dim": "#d5d9f0",

                        "on-secondary-fixed-variant": "#005320",
                        "secondary": "#006e2c",
                        "on-secondary-fixed": "#002108",

    <style>
        .progress-bar-animated {
            animation: progress 10s linear forwards;
        }

        @keyframes progress {
            0% {
                width: 0%;
            }

            100% {
                width: 100%;
            }
        }

        .icon-animated {
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
        }

        @keyframes scaleIn {
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen flex flex-col font-body-md antialiased overflow-hidden">
    <header class="w-full top-0 left-0 bg-surface z-50">
        <div
            class="flex justify-between items-center px-margin-mobile md:px-margin-desktop h-16 w-full max-w-[1280px] mx-auto">
            <div class="flex items-center gap-base">
                <span aria-hidden="true" class="material-symbols-outlined text-google-blue text-2xl">qr_code_2</span>
                <span
                    class="font-headline-sm text-headline-sm-mobile md:font-headline-sm md:text-headline-sm font-bold text-google-blue">GDG
                    Connect</span>
            </div>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center p-margin-mobile md:p-margin-desktop relative">
        <div class="absolute inset-0 pointer-events-none overflow-hidden flex justify-center items-center opacity-30">
            <div class="w-96 h-96 bg-primary-fixed rounded-full blur-[100px] absolute -top-20 -right-20"></div>
            <div class="w-96 h-96 bg-secondary-fixed rounded-full blur-[100px] absolute -bottom-20 -left-20"></div>
        </div>
        <div id="content-card"
            class="max-w-md w-full bg-surface-container-lowest border border-surface-variant rounded-[2rem] p-lg flex flex-col items-center text-center shadow-sm relative z-10">
            <div id="main-view" class="w-full flex flex-col items-center">
                <div
                    class="w-24 h-24 bg-primary-container text-on-primary-container rounded-full flex items-center justify-center mb-md icon-animated">
                    <span aria-hidden="true" class="material-symbols-outlined text-[48px]"
                        style="font-variation-settings: 'FILL' 1;">work</span>
                </div>
                <h1 class="font-headline-md text-headline-md text-on-surface mb-sm">Abrindo perfil no LinkedIn</h1>
                <p class="font-body-md text-body-md text-outline mb-lg">
                    Toque no botão abaixo para abrir o perfil no app do LinkedIn.
                </p>
                <button
                    class="w-full px-lg py-md bg-google-blue text-white font-label-lg text-label-lg rounded-full hover:opacity-90 transition-opacity active:scale-95 duration-150 mb-md"
                    id="open-app-btn">
                    Abrir no LinkedIn
                </button>
                <div class="w-full mb-base">
                    <div class="flex justify-between items-end mb-xs">
                        <span class="font-label-md text-label-md text-outline">Redirecionando para o navegador...</span>
                        <span class="font-label-md text-label-md text-outline" id="countdown">6s</span>
                    </div>
                    <div class="h-2 w-full bg-surface-variant rounded-full overflow-hidden">
                        <div class="h-full bg-google-blue rounded-full progress-bar-animated"></div>
                    </div>
                </div>
                <button
                    class="text-google-blue font-label-lg text-label-lg underline underline-offset-4 hover:opacity-80 transition-opacity"
                    id="open-web-btn">
                    Abrir no navegador
                </button>
            </div>
            <div id="error-view" class="hidden w-full flex flex-col items-center">
                <div
                    class="w-24 h-24 bg-error-container text-on-error-container rounded-full flex items-center justify-center mb-md">
                    <span aria-hidden="true" class="material-symbols-outlined text-[48px]">error</span>
                </div>
                <h1 class="font-headline-md text-headline-md text-on-surface mb-sm">Link inválido</h1>
                <p class="font-body-md text-body-md text-outline">
                    Não foi possível abrir o perfil do LinkedIn. Verifique o QR Code e tente novamente.
                </p>
            </div>
        </div>
    </main>
    <script src="/js/linkedin-open.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search)
            const linkedinUrl = params.get('url')
            const mainView = document.getElementById('main-view')
            const errorView = document.getElementById('error-view')

            if (!linkedinUrl || !LinkedInOpen.isValidLinkedInUrl(linkedinUrl)) {
                mainView.classList.add('hidden')
                errorView.classList.remove('hidden')
                return
            }

            const openAppBtn = document.getElementById('open-app-btn')
            const openWebBtn = document.getElementById('open-web-btn')
            const countdownElement = document.getElementById('countdown')

            openAppBtn.addEventListener('click', () => LinkedInOpen.openLinkedIn(linkedinUrl))
            openWebBtn.addEventListener('click', () => LinkedInOpen.openLinkedInWeb(linkedinUrl))

            let seconds = 6
            const interval = setInterval(() => {
                seconds--
                if (seconds >= 0) countdownElement.textContent = `${seconds}s`
                if (seconds === 0) {
                    clearInterval(interval)
                    LinkedInOpen.openLinkedInWeb(linkedinUrl)
                }
            }, 1000)
        });
    </script>
</body>

</html>
